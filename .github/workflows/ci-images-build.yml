name: CI - images build & lint

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Read latest buildable Chrome version from chrome-versions.json
        id: versions
        run: |
          set -euo pipefail

          if [ ! -f chrome-versions.json ]; then
            echo "ERROR: chrome-versions.json not found."
            exit 1
          fi

          if [ ! -s chrome-versions.json ]; then
            echo "ERROR: chrome-versions.json is empty."
            exit 1
          fi

          echo "Reading latest buildable Chrome version from chrome-versions.json..."

          VERSION_KEY="$(jq -r '
            to_entries
            | map(select(.value.status == "pending" or .value.status == "published"))
            | sort_by(.key | split(".") | map(tonumber))
            | (last | .key) // empty
          ' chrome-versions.json)"

          if [ -z "$VERSION_KEY" ] || [ "$VERSION_KEY" = "null" ]; then
            echo "ERROR: No pending or published version keys found."
            exit 1
          fi

          STATUS="$(jq -r --arg v "$VERSION_KEY" '.[$v].status // "unknown"' chrome-versions.json)"
          CHROME_DEB_VERSION="$(jq -r --arg v "$VERSION_KEY" '.[$v].chrome_deb_version // empty' chrome-versions.json)"
          CHROMEDRIVER_VERSION="$(jq -r --arg v "$VERSION_KEY" '.[$v].chromedriver_version // empty' chrome-versions.json)"

          if [ -z "$CHROME_DEB_VERSION" ] || [ "$CHROME_DEB_VERSION" = "null" ]; then
            echo "ERROR: chrome_deb_version missing."
            exit 1
          fi

          if [ -z "$CHROMEDRIVER_VERSION" ] || [ "$CHROMEDRIVER_VERSION" = "null" ]; then
            echo "ERROR: chromedriver_version missing."
            exit 1
          fi

          echo "Using version:"
          echo "  version_key:          $VERSION_KEY"
          echo "  status:               $STATUS"
          echo "  chrome_deb_version:   $CHROME_DEB_VERSION"
          echo "  chromedriver_version: $CHROMEDRIVER_VERSION"

          echo "version_key=$VERSION_KEY" >> "$GITHUB_OUTPUT"
          echo "chrome_deb_version=$CHROME_DEB_VERSION" >> "$GITHUB_OUTPUT"
          echo "chromedriver_version=$CHROMEDRIVER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Make images script executable
        run: chmod +x ./images

      - name: Build Chrome VNC image via ./images
        run: |
          echo "Building Docker image for Chrome ${{ steps.versions.outputs.version_key }}"
          ./images chrome \
            -b "${{ steps.versions.outputs.chrome_deb_version }}" \
            -d "${{ steps.versions.outputs.chromedriver_version }}" \
            -t lafisteri/vnc_chrome:ci-test \
            vnc_chrome
