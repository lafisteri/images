name: Check for last Chrome

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Resolve latest Linux Chrome and matching Chromedriver
        id: latest
        run: |
          set -euo pipefail

          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/google-chrome.gpg >/dev/null

          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list >/dev/null

          sudo apt-get update

          CHROME_DEB_VERSION="$(apt-cache madison google-chrome-stable | awk '{print $3}' | sort -V | tail -n1)"
          if [ -z "${CHROME_DEB_VERSION:-}" ] || [ "$CHROME_DEB_VERSION" = "null" ]; then
            echo "Failed to fetch latest google-chrome-stable APT version"
            exit 1
          fi

          VERSION_KEY="${CHROME_DEB_VERSION%-*}"
          CHROME_BUILD="$(echo "${VERSION_KEY}" | cut -d. -f1-3)"
          CHROME_MILESTONE="${VERSION_KEY%%.*}"

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "${TMP_DIR}"' EXIT

          curl -fsSL https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json -o "${TMP_DIR}/versions.json"
          curl -fsSL https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json -o "${TMP_DIR}/builds.json"
          curl -fsSL https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone-with-downloads.json -o "${TMP_DIR}/milestones.json"

          lookup_exact_version() {
            local version="${1}"
            local resolved_url

            resolved_url="$(
              jq -r --arg v "${version}" '
                .versions[] | select(.version==$v) | .downloads.chromedriver[]? | select(.platform=="linux64") | .url
              ' "${TMP_DIR}/versions.json"
            )"

            if [ -n "${resolved_url}" ] && [ "${resolved_url}" != "null" ]; then
              printf '%s\n' "${version}"
              return 0
            fi

            return 1
          }

          lookup_build_version() {
            local build="${1}"
            local resolved_version
            local resolved_url

            resolved_version="$(jq -r --arg b "${build}" '.builds[$b].version // empty' "${TMP_DIR}/builds.json")"
            resolved_url="$(
              jq -r --arg b "${build}" '
                .builds[$b].downloads.chromedriver[]? | select(.platform=="linux64") | .url
              ' "${TMP_DIR}/builds.json"
            )"

            if [ -n "${resolved_version}" ] && [ -n "${resolved_url}" ] && [ "${resolved_url}" != "null" ]; then
              printf '%s\n' "${resolved_version}"
              return 0
            fi

            return 1
          }

          lookup_milestone_version() {
            local milestone="${1}"
            local resolved_version
            local resolved_url

            resolved_version="$(jq -r --arg m "${milestone}" '.milestones[$m].version // empty' "${TMP_DIR}/milestones.json")"
            resolved_url="$(
              jq -r --arg m "${milestone}" '
                .milestones[$m].downloads.chromedriver[]? | select(.platform=="linux64") | .url
              ' "${TMP_DIR}/milestones.json"
            )"

            if [ -n "${resolved_version}" ] && [ -n "${resolved_url}" ] && [ "${resolved_url}" != "null" ]; then
              printf '%s\n' "${resolved_version}"
              return 0
            fi

            return 1
          }

          if CHROMEDRIVER_VERSION="$(lookup_exact_version "${VERSION_KEY}")"; then
            echo "Found exact Chromedriver match for ${VERSION_KEY}"
          elif CHROMEDRIVER_VERSION="$(lookup_build_version "${CHROME_BUILD}")"; then
            echo "No exact Chromedriver for ${VERSION_KEY}; using build-compatible ${CHROMEDRIVER_VERSION}"
          elif CHROMEDRIVER_VERSION="$(lookup_milestone_version "${CHROME_MILESTONE}")"; then
            echo "No build-compatible Chromedriver for ${VERSION_KEY}; using milestone ${CHROMEDRIVER_VERSION}"
          else
            echo "Failed to resolve a compatible Chromedriver for ${VERSION_KEY}"
            exit 1
          fi

          echo "Latest Linux Chrome APT version: $VERSION_KEY"
          echo "chrome_deb_version:   $CHROME_DEB_VERSION"
          echo "chromedriver_version: $CHROMEDRIVER_VERSION"

          echo "version_key=$VERSION_KEY" >> "$GITHUB_OUTPUT"
          echo "chrome_deb_version=$CHROME_DEB_VERSION" >> "$GITHUB_OUTPUT"
          echo "chromedriver_version=$CHROMEDRIVER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure chrome-versions.json exists
        run: |
          if [ ! -f chrome-versions.json ]; then
            echo "{}" > chrome-versions.json
          fi

      - name: Check if chrome-versions.json needs sync
        id: check_sync
        run: |
          set -euo pipefail

          VERSION_KEY="${{ steps.latest.outputs.version_key }}"
          CHROME_DEB_VERSION="${{ steps.latest.outputs.chrome_deb_version }}"
          CHROMEDRIVER_VERSION="${{ steps.latest.outputs.chromedriver_version }}"

          EXISTS="$(jq -e --arg v "$VERSION_KEY" 'has($v)' chrome-versions.json >/dev/null 2>&1 && echo "yes" || echo "no")"
          CURRENT_CHROME_DEB_VERSION="$(jq -r --arg v "$VERSION_KEY" '.[$v].chrome_deb_version // empty' chrome-versions.json)"
          CURRENT_CHROMEDRIVER_VERSION="$(jq -r --arg v "$VERSION_KEY" '.[$v].chromedriver_version // empty' chrome-versions.json)"

          NEEDS_SYNC="no"
          if [ "$EXISTS" = "no" ]; then
            NEEDS_SYNC="yes"
          elif [ "$CURRENT_CHROME_DEB_VERSION" != "$CHROME_DEB_VERSION" ] || [ "$CURRENT_CHROMEDRIVER_VERSION" != "$CHROMEDRIVER_VERSION" ]; then
            NEEDS_SYNC="yes"
          fi

          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "needs_sync=$NEEDS_SYNC" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION_KEY present? $EXISTS"
          echo "Version $VERSION_KEY needs sync? $NEEDS_SYNC"

      - name: Upsert resolved version in chrome-versions.json
        if: steps.check_sync.outputs.needs_sync == 'yes'
        run: |
          set -euo pipefail

          VERSION_KEY="${{ steps.latest.outputs.version_key }}"
          CHROME_DEB_VERSION="${{ steps.latest.outputs.chrome_deb_version }}"
          CHROMEDRIVER_VERSION="${{ steps.latest.outputs.chromedriver_version }}"
          TIMESTAMP="$(date -u +%FT%TZ)"

          echo "Syncing version $VERSION_KEY in chrome-versions.json"

          UPDATED_JSON="$(jq \
            --arg v "$VERSION_KEY" \
            --arg chrome "$CHROME_DEB_VERSION" \
            --arg driver "$CHROMEDRIVER_VERSION" \
            --arg ts "$TIMESTAMP" \
            'if has($v) then
               .[$v].chrome_deb_version = $chrome
               | .[$v].chromedriver_version = $driver
             else
               . + {($v): {
                 chrome_deb_version: $chrome,
                 chromedriver_version: $driver,
                 status: "pending",
                 attempts: 0,
                 created_at: $ts
               }}
             end' \
            chrome-versions.json)"

          echo "$UPDATED_JSON" > chrome-versions.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chrome-versions.json
          git commit -m "chore: sync Chrome $VERSION_KEY metadata"
          git push

      - name: Nothing to update
        if: steps.check_sync.outputs.needs_sync == 'no'
        run: |
          echo "chrome-versions.json already contains the resolved Chrome and Chromedriver versions."
